<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <link rel="stylesheet" href="/src/style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tristan Parry • Software Engineer</title>
    <!-- SPA redirect script for GitHub Pages -->
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash,
          );
        }
      })(window.location);
    </script>
  </head>
  <body
    class="font-body bg-primary-bg text-primary-text min-h-screen-safe flex flex-col overflow-x-hidden transition-colors duration-200"
  >
    <main id="root" class="flex flex-1 flex-col"></main>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
